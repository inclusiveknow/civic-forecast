<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>404 · the civic forecast</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Inter+Tight:ital,wght@0,500;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
<style>
  .four-page {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .four-inner { max-width: 460px; }
  .four-glyph {
    width: 120px; height: 120px;
    margin: 0 auto 24px;
    opacity: 0.7;
  }
  .four-glyph svg { width: 100%; height: 100%; }
  .four-num {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(72px, 12vw, 120px);
    line-height: 0.9;
    color: var(--ink);
    letter-spacing: -0.04em;
  }
  .four-message {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 22px;
    line-height: 1.4;
    color: var(--ink-soft);
    margin: 14px 0 28px;
  }
  .four-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 999px;
    border: 1px solid rgba(168, 176, 194, 0.25);
    color: var(--ink);
    font-size: 14px;
  }
  .four-link:hover { border-color: var(--clear); color: var(--clear); }
</style>
</head>
<body>
<div class="ambient" aria-hidden="true">
  <div class="ambient-glow ambient-glow-1"></div>
  <div class="ambient-glow ambient-glow-3"></div>
</div>
<main class="four-page">
  <div class="four-inner">
    <div class="four-glyph" aria-hidden="true">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="g404" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#a8b0c2" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#a8b0c2" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="60" cy="60" r="55" fill="url(#g404)"/>
        <ellipse cx="50" cy="55" rx="20" ry="10" fill="#a8b0c2" opacity="0.4"/>
        <ellipse cx="68" cy="68" rx="22" ry="9" fill="#a8b0c2" opacity="0.35"/>
      </svg>
    </div>
    <div class="four-num">404</div>
    <p class="four-message">that page is fog. nothing to read here.</p>
    <a class="four-link" href="/">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M19 12H5M11 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      back to today's forecast
    </a>
  </div>
</main>
</body>
</html>
