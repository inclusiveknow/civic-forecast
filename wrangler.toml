# =============================================================================
# THE CIVIC FORECAST — Cloudflare configuration
#
# This file configures both:
#   1. The static Pages deployment (the public website)
#   2. The Worker pipeline that pulls data daily and writes reading.json
#
# Deploy: see DEPLOY.md
# =============================================================================

name = "civic-forecast"
main = "workers/pipeline/index.ts"
compatibility_date = "2026-04-01"

# NOTE: This file configures the WORKER (the daily real-time pipeline) only.
# A single wrangler config cannot be both a Worker and a Pages project — if
# `pages_build_output_dir` is set here, `wrangler deploy` errors out. The
# static site is deployed separately: via the Cloudflare Pages dashboard
# (Direct Upload of ./public, or Git-connect with output dir `public`), or
# with `npm run deploy:pages` which uses wrangler.pages.toml. See DEPLOY.md.

# ---- Cron triggers (Worker) --------------------------------------------------
# Times are in UTC. 04:00 / 05:00 / 06:00 ET = 08:00 / 09:00 / 10:00 UTC (EST).
# Cloudflare cron does not support local time; the Worker reads scheduledTime
# and computes ET internally if needed.
[triggers]
crons = [
  "0 8 * * *",   # 04:00 ET — pull
  "0 9 * * *",   # 05:00 ET — compute
  "0 10 * * *",  # 06:00 ET — publish
]

# ---- KV namespace for time-series readings -----------------------------------
# Create with: wrangler kv namespace create READINGS   (npm run kv:create)
[[kv_namespaces]]
binding = "READINGS"
id = "REPLACE_WITH_YOUR_KV_ID"

# ---- R2 bucket for permanent archive -----------------------------------------
# Create with: wrangler r2 bucket create civic-forecast-archive
[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "civic-forecast-archive"

# ---- Secrets -----------------------------------------------------------------
# Set with `wrangler secret put <NAME>`:
#   wrangler secret put PROPUBLICA       # ProPublica Congress API
#   wrangler secret put COURTLISTENER    # CourtListener token
#   wrangler secret put ACLED            # ACLED API key
#   wrangler secret put ANTHROPIC        # Claude API key (Haiku for sentence/advisory)
#
# (MuckRock and Federal Register and Press Freedom Tracker need no key.)

# ---- Routes ------------------------------------------------------------------
# The Worker is reachable at the route below; the Pages site is reachable at
# its Pages domain (e.g. civic-forecast.pages.dev or your custom domain).
[[routes]]
pattern = "civicforecast.org/api/*"
zone_name = "civicforecast.org"
